<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>盐焗鸭 - 前端开发工程师</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #ffd1dc 0%, #ffc0cb 50%, #ffb6c1 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #ff69b4 0%, #ff1493 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .header .title { font-size: 1.2rem; opacity: 0.9; letter-spacing: 4px; }

        .contact-row {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(255, 255, 255, 0.9);
        }

        .content { padding: 50px; }

        .section { margin-bottom: 40px; }
        .section:last-child { margin-bottom: 0; }

        .section-title {
            font-size: 1.3rem;
            color: #2c3e50;
            border-left: 4px solid #ff69b4;
            padding-left: 15px;
            margin-bottom: 24px;
            font-weight: 600;
        }

        .info-section { display: flex; gap: 30px; }
        .info-left { flex: 1; }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px;
        }

        .info-item {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            background: #fff0f5;
            border-radius: 8px;
        }

        .info-label { color: #7f8c8d; margin-right: 10px; min-width: 50px; font-size: 0.9rem; }
        .info-value { color: #2c3e50; font-weight: 500; font-size: 0.95rem; }

        .info-right {
            width: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 照片上传区域 */
        .photo-box {
            width: 120px;
            height: 150px;
            border: 2px dashed #ff69b4;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #fff0f5;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .photo-box:hover {
            border-color: #ff1493;
            background: #ffe4f0;
        }

        .photo-box .icon {
            font-size: 2rem;
            color: #ff69b4;
            margin-bottom: 8px;
        }

        .photo-box .text {
            font-size: 0.75rem;
            color: #999;
            text-align: center;
        }

        .photo-box input[type="file"] {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .photo-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 6px;
            display: none;
        }

        .photo-box.has-photo {
            border-style: solid;
        }

        .photo-box.has-photo .icon,
        .photo-box.has-photo .text {
            display: none;
        }

        .photo-box.has-photo .photo-preview {
            display: block;
        }

        .photo-label { color: #7f8c8d; font-size: 0.85rem; margin-top: 8px; }

        .education-item {
            padding: 22px;
            background: #fff0f5;
            border-radius: 10px;
            margin-bottom: 16px;
            border-left: 3px solid #ff69b4;
        }

        .education-item:last-child { margin-bottom: 0; }

        .education-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 14px;
        }

        .education-row:last-child { margin-bottom: 0; }

        .edu-field { display: flex; flex-direction: column; }
        .edu-field label { font-size: 0.8rem; color: #95a5a6; margin-bottom: 4px; }
        .edu-field .value { color: #2c3e50; font-weight: 500; font-size: 0.95rem; }
        .edu-desc { margin-top: 12px; padding-top: 12px; border-top: 1px dashed #ffb6c1; color: #7f8c8d; font-size: 0.9rem; }

        .skills-container { display: flex; flex-wrap: wrap; gap: 14px; }

        .skill-tag {
            padding: 10px 18px;
            background: linear-gradient(135deg, #ff69b4 0%, #ff1493 100%);
            color: white;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        .project-item {
            padding: 22px;
            background: #fff0f5;
            border-radius: 10px;
            margin-bottom: 16px;
        }

        .project-item:last-child { margin-bottom: 0; }
        .project-name { font-size: 1.1rem; color: #2c3e50; font-weight: 600; margin-bottom: 10px; }
        .project-desc { color: #666; line-height: 1.6; font-size: 0.95rem; }

        .self-evaluation {
            padding: 22px;
            background: linear-gradient(135deg, #fff0f5 0%, #ffe4e9 100%);
            border-radius: 10px;
            line-height: 1.8;
            color: #555;
        }

        /* 使用说明 */
        .tips {
            background: linear-gradient(135deg, #fff9e6 0%, #fff3cc 100%);
            border: 1px solid #ffd700;
            border-radius: 10px;
            padding: 15px 20px;
            margin-bottom: 25px;
        }

        .tips-title {
            font-weight: 600;
            color: #b8860b;
            margin-bottom: 8px;
        }

        .tips-content {
            font-size: 0.9rem;
            color: #666;
            line-height: 1.6;
        }

        @media (max-width: 700px) {
            .info-section { flex-direction: column; }
            .info-right { width: 100%; flex-direction: row; justify-content: flex-start; gap: 15px; }
            .photo-box { width: 100px; height: 125px; }
            .info-grid { grid-template-columns: 1fr; }
            .education-row { grid-template-columns: 1fr; }
            .header h1 { font-size: 1.8rem; }
            .content { padding: 25px; }
        }
        .img {
            width: 100%;height: 100%;
        }
    </style>
</head>

    <script>
        function handlePhotoUpload(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const photoBox = document.getElementById('photoBox');
                    const preview = document.getElementById('photoPreview');
                    preview.src = e.target.result;
                    photoBox.classList.add('has-photo');
                }
                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>
